<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Google Maps API Scratch</title>
  </head>

  <body>
    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1>Asset Location</h1>
      <subtitle>
        This is a scratch project for experimenting with the Google Maps API
      </subtitle>
    </div>

    <!-- NAV -->
    <nav class="page-nav">
      <ul id="top-level">
        <li tabindex="0" role="navigation">Global View</li>
        <li tabindex="0" role="navigation">By Facility</li>
        <li tabindex="0" role="navigation">All Assets</li>
      </ul>
    </nav>

    <!-- SIDE NAV -->
    <nav class="side-nav">
      <span id="close-side-nav" role="button" class="nav-control" tabindex="0">
        <i class="fa-solid fa-angles-left"></i>
      </span>
      <ul id="side-nav-list">
        <li tabindex="0" role="navigation" class="return-nav">
          <a tabindex="-1" href="#">Return to Top</a>
        </li>
      </ul>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-content">
      <!-- GLOBAL VIEW -->
      <div id="global-view-table" class="table-wrapper">
        <div class="table-header" tabindex="0" role="button">
          <h2>Global View</h2>
          <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div class="table-content">
          <div class="global-map-legend">
            <ul class="cities-list"></ul>
          </div>
        </div>
      </div>

      <!-- BY FACILITY -->
      <div id="by-facility-table" class="table-wrapper">
        <div class="table-header" tabindex="0" role="button">
          <h2>By Facility</h2>
          <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div class="table-content">
          <nav>
            <ul class="cities-list"></ul>
          </nav>
        </div>
      </div>

      <!-- ALL ASSETS -->
      <div id="all-assets-table" class="table-wrapper">
        <div class="table-header" tabindex="0" role="button">
          <h2>All Assets</h2>
          <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div class="table-content">
          <table>
            <thead>
              <tr>
                <th class="sortable" data-column="0" tabindex="0">
                  Serial <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="1" tabindex="0">
                  Type <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="2" tabindex="0">
                  Description <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="3" tabindex="0">
                  Location <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="4" tabindex="0">
                  Status <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="5" tabindex="0">
                  Last Seen <span class="sort-icon"></span>
                </th>
              </tr>
            </thead>
            <tbody id="generated-rows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="main.js" type="module"></script>
    <script src="mapUtils.js" type="module"></script>
    <script
      src="https://maps.googleapis.com/maps/api/js?key=__MAPS_API_KEY__&libraries=maps&v=beta&loading=async"
      async
      defer
    ></script>
  </body>
</html>
