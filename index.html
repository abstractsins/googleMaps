<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Google Maps API Scratch</title>
  </head>

  <body>
    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1>Google Maps API Scratch</h1>
      <subtitle>
        This is a scratch project for experimenting with the Google Maps API
      </subtitle>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content">
      <div class="asset-table-wrapper">
        <div class="table-header">
          <h2>Assets</h2>
        </div>
        <div class="table-content">
          <table>
            <tr>
              <th>Serial</th>
              <th>Type</th>
              <th>Description</th>
              <th>Location</th>
            </tr>
            <tr>
              <td><span class="asset-serial"></span></td>
              <td>Camera</td>
              <td>Surveillance Camera</td>
              <td>Building A</td>
            </tr>
            <tr>
              <td><span class="asset-serial"></span></td>
              <td>Sensor</td>
              <td>Temperature Sensor</td>
              <td>Building B</td>
            </tr>
            <tr>
              <td><span class="asset-serial"></span></td>
              <td>Router</td>
              <td>WiFi Router</td>
              <td>Building C</td>
            </tr>
          </table>
        </div>
      </div>
    </div>
    <script src="main.js" defer></script>
  </body>
</html>
