<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Google Maps API Scratch</title>
  </head>

  <body>
    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1>Google Maps API Scratch</h1>
      <subtitle>
        This is a scratch project for experimenting with the Google Maps API
      </subtitle>
    </div>

    <!-- GOOGLE MAPS COMPONENT -->
    <div class="map-container">
      <div class="map-header">
        <h2>Your current location:</h2>
      </div>
      <gmp-map
        zoom="20"
        map-id="DEMO_MAP_ID"
      ></gmp-map>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content">
      <div class="asset-table-wrapper">
        <div class="table-header">
          <h2>Assets</h2>
        </div>
        <div class="table-content">
          <table>
            <thead>
              <tr>
                <th class="sortable" data-column="0">
                  Serial <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="1">
                  Type <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="2">
                  Description <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="3">
                  Location <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="4">
                  Status <span class="sort-icon"></span>
                </th>
                <th class="sortable" data-column="5">
                  Last Seen <span class="sort-icon"></span>
                </th>
              </tr>
            </thead>
            <tbody id="generated-rows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="main.js" type="module"></script>
    <script
      src="https://maps.googleapis.com/maps/api/js?key=__MAPS_API_KEY__&libraries=maps&v=beta"
      async
      defer
    ></script>
  </body>
</html>
